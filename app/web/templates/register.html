<!doctype html>
<html data-url-prefix="{{ url_prefix }}" data-home-url="{{ url('home') }}"
      data-login-url="{{ url('login') }}" data-logout-url="{{ url('logout') }}"
      data-register-url="{{ url('register') }}" data-refresh-url="{{ url('refresh') }}">
<head>
  <title>Register - JP-EN App</title>
  <link rel="stylesheet" href="{{ url('static', 'css/style_common.css') }}">
  <link rel="stylesheet" href="{{ url('static', 'css/auth/register.css') }}">
</head>
<body>
  <div class="register-container">
    <h2>Register</h2>
    
    <div id="message"></div>
    
    <form id="register-form">
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      </div>
      
      <div class="form-group">
        <label for="is_admin">
          <input type="checkbox" id="is_admin" name="is_admin">
          Admin account
        </label>
      </div>
      
      <button type="submit" class="btn-submit">Register</button>
    </form>
    
    <div class="link">
      Already have an account? <a href="{{ url('login') }}">Login here</a>
    </div>
  </div>
  
  <script src="{{ url('static', 'js/auth/auth.js') }}"></script>
  <script src="{{ url('static', 'js/auth/register.js') }}"></script>
</body>
</html>
