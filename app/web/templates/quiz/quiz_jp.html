<!doctype html>
<html data-url-prefix="{{ url_prefix }}">
<head>
  <title>Quiz JP → EN</title>
  <link rel="stylesheet" href="{{ url_for('main_ep.static', filename='css/style_common.css') }}">
  <link rel="stylesheet" href="{{ url_for('main_ep.static', filename='css/quiz/quiz_jp.css') }}">
  <script src="{{ url_for('main_ep.static', filename='js/quiz/quiz_jp.js') }}" defer></script>
  <script src="{{ url_for('main_ep.static', filename='js/base.js') }}" defer></script>
</head>
<body>
  <div class="header-container">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Quiz: JP → EN</h2>
    <button class="home-btn" onclick="goHome()">🏠Home</button>
  </div>

  <div id="scoreBoard">
    <span>Correct: <strong id="correctCount">0</strong></span>
    <span>Skipped: <strong id="skippedCount">0</strong></span>
    <span>Progress: <strong id="progressCount">0</strong> / <strong id="totalCount">0</strong></span>
  </div>

  <div id="quizContainer">
    <!-- Quiz cards will be dynamically generated by JS -->
  </div>

  <div id="navigationButtons">
    <button id="skipNextBtn" onclick="handleSkipNext()">Skip</button>
  </div>

  <!-- Pass quiz data from backend to JS -->
  <script>
    const quizData = "{{ quizes | tojson }}";
    const updatePrioUrl = "{{ url_for('main_ep.update_word_prio') }}";
  </script>
</body>
</html>
