<!doctype html>
<html data-url-prefix="{{ url_prefix }}">
<head>
  <title>Quiz JP → EN</title>
  <link rel="stylesheet" href="{{ url('static', 'css/style_common.css') }}">
  <link rel="stylesheet" href="{{ url('static', 'css/quiz/quiz_run.css') }}">
  <script src="{{ url('static', 'js/quiz/quiz_run.js') }}" defer></script>
  <script src="{{ url('static', 'js/base.js') }}" defer></script>
</head>
<body>
  <div class="header-container">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Quiz: JP → EN</h2>
    <button class="home-btn" onclick="goHome()">🏠Home</button>
  </div>

  <div id="scoreBoard">
    <span>Correct: <strong id="correctCount">0</strong></span>
    <span>Skipped: <strong id="skippedCount">0</strong></span>
    <span>Progress: <strong id="progressCount">0</strong> / <strong id="totalCount">0</strong></span>
  </div>

  <div id="quizContainer">
    <!-- Quiz cards will be dynamically generated by JS -->
  </div>

  <div id="navigationButtons">
    <button id="skipNextBtn" onclick="handleSkipNext()">Skip</button>
  </div>

  <!-- Pass `quizes` (dict containing all the testcases) and url to update word priority calcutlaion to JS -->
  <div id="quiz-backend-params"
     data-quizes='{{ quizes | tojson }}'
     data-mode="{{ mode }}"
     data-update-prio-url="{{ url('update_word_prio') }}"
     data-view-word-url-template="{{ url('view_specific_word') }}0"
     data-toggle-star-url="{{ url('toggle_star') }}">
  </div>

</body>
</html>
