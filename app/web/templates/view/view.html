<!doctype html>
<html>
<head>
  <title>View</title>
  <link rel="stylesheet" href="{{ url_for('main_ep.static', filename='css/style_common.css') }}">
  <script src="{{ url_for('main_ep.static', filename='base.js') }}" defer></script>
</head>
<body>
  <script>
    // Show all navigation history on page load (for debugging)
    window.addEventListener('DOMContentLoaded', function() {
      const currentPath = window.location.pathname;
      const currentSearch = window.location.search;
      const previousPath = sessionStorage.getItem('previousPath');
      const previousSearch = sessionStorage.getItem('previousSearch');
      
      const message = `Current page: ${currentPath}${currentSearch}
Previous path: ${previousPath || 'N/A'}
Previous search: ${previousSearch || 'N/A'}`;
      
      alert(message);
    });
  </script>

  <div class="header-container">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>View</h2>
  </div>
  
  <form method="GET" action="{{ url_for('main_ep.search_word') }}">
    <button type="submit">Search word</button>
  </form>

  <form method="GET" action="{{ url_for('main_ep.view_words') }}">
    <button type="submit">View words</button>
  </form>


  <form method="GET" action="{{ url_for('main_ep.view_books') }}">
    <button type="submit">View books</button>
  </form>


</body>
</html>
