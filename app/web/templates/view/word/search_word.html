<!DOCTYPE html>
<html data-url-prefix="{{ url_prefix }}">
<head>
  <title>Search word</title>
  <link rel="stylesheet" href="{{ url_for('main_ep.static', filename='css/view/word/search_word.css') }}">
  <link rel="stylesheet" href="{{ url_for('main_ep.static', filename='css/style_common.css') }}">
  <script src="{{ url_for('main_ep.static', filename='view.js') }}" defer></script>
  <script src="{{ url_for('main_ep.static', filename='base.js') }}" defer></script>
</head>
<body>
  <div class="header-container">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>Search word</h2>
    <button class="home-btn" onclick="goHome()">🏠Home</button>
  </div>

	<!-- Search bar -->
  <form class="form-search-word-box" id="searchWordForm" method="GET" action="{{ url_for('main_ep.search_word') }}">
    <div class="form-search-word-group">
      <label for="word">Enter word (JP or EN):</label>
      <input type="text" id="word" name="word" required>
    </div>

    <div class="form-search-word-group">
      <label for="word">Search limit:</label>

      <div class="limit-search-word-group">
        <input type="number" class="searchLimit" name="limit" value="10" min="1" max="100" placeholder="Limit">
        <span>(1-100 results)</span>
      </div>
    </div>

    <button type="submit" class="search-word-button">Search</button>
  </form>

  <!-- Response error or show search result -->
  <div id="searchWordNotice" style="display:none"></div>
  <div id="showRes" style="display:none"></div>

</body>
</html>
