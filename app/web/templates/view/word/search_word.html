<!DOCTYPE html>
<html>
<head>
  <title>Search word</title>
  <link rel="stylesheet" href="{{ url_for('main_ep.static', filename='style.css') }}">
  <script src="{{ url_for('main_ep.static', filename='view.js') }}" defer></script>
</head>
<body>
	<h2>Search word</h2>

	<!-- Search bar -->
  <form class="form-row" id="searchWordForm" method="GET" action="{{ url_for('main_ep.search_word') }}">
    <label for="word">Enter word (JP or EN):</label>
    <input type="text" id="word" name="word" required>
    <input type="number" name="limit" value="10" min="1" max="100" placeholder="Limit">
    <button type="submit" class="button-right">Search</button>
  </form>

  <!-- Response error or show search result -->
  <div id="searchWordNotice" style="display:none"></div>
  <div id="showRes" style="display:none">

</body>
</html>
