<!DOCTYPE html>
<html data-url-prefix="{{ url_prefix }}">
<head>
  <title>View book</title>
  <link rel="stylesheet" href="{{ url_for('main_ep.static', filename='css/view/book/view_specific_book.css') }}">
  <link rel="stylesheet" href="{{ url_for('main_ep.static', filename='css/style_common.css') }}">
  <script src="{{ url_for('main_ep.static', filename='view.js') }}" defer></script>
  <script src="{{ url_for('main_ep.static', filename='base.js') }}" defer></script>
</head>
<body>
  <div class="header-container">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <h2>View book</h2>
    <button class="home-btn" onclick="goHome()">🏠Home</button>
  </div>

  <div class="book-detail">
    <div class="book-header">
      <div class="star-and-name">
        <button id="bookStarToggle" type="button"
            class="book-star-toggle {{ 'yellow' if book_details.star else 'white' }}"
            aria-pressed="{{ 'true' if book_details.star else 'false' }}"
            data-toggle-url="{{ url_for('main_ep.toggle_star') }}"
            data-id="{{ book_details.book_id }}"
        >★</button>

        <p id="bookName"><strong>{{ book_details.name }}</strong></p>

        <button id="deleteBook" type="button"
            data-id="{{ book_details.book_id }}"
            data-name="{{ book_details.name }}"
            data-delete-url="{{ url_for('main_ep.delete_book') }}"
        >Delete</button>
      </div>
    </div>

    <p><strong>Created:</strong> {{ book_details.created }}</p>

    <div class="book-body">
      <p>{{ book_details.content }}</p>
    </div>
  </div>

</body>
