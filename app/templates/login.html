<!doctype html>
<html data-url-prefix="{{ url_prefix }}" data-home-url="{{ url('home') }}"
      data-login-url="{{ url('login') }}" data-logout-url="{{ url('logout') }}"
      data-register-url="{{ url('register') }}" data-refresh-url="{{ url('refresh') }}">
<head>
  <title>Login - JP-EN App</title>
  <link rel="stylesheet" href="{{ url('static', 'css/style_common.css') }}">
  <link rel="stylesheet" href="{{ url('static', 'css/auth/login.css') }}">
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    
    <div id="message"></div>
    
    <form id="login-form">
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      </div>
      
      <button type="submit" class="btn-submit">Login</button>
    </form>
    
    <div class="link">
      Don't have an account? <a href="{{ url_prefix }}/register">Register here</a>
    </div>
  </div>
  
  <script src="{{ url('static', 'js/auth/auth.js') }}"></script>
  <script src="{{ url('static', 'js/auth/login.js') }}"></script>
</body>
</html>
