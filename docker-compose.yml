services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_HOST=postgres
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  taskiq-worker:
    build: .
    command: >
      taskiq worker app.taskiq_broker:broker app.tasks.job_books
      --workers ${TASKIQ_MAX_WORKERS:-4}
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - TASKIQ_BROKER_URL=redis://redis:6379/0
      - TASKIQ_RESULT_URL=redis://redis:6379/0
      - TASKIQ_QUEUE_NAME=${TASKIQ_QUEUE_NAME:-taskiq}
      - TASKIQ_CONSUMER_GROUP=${TASKIQ_CONSUMER_GROUP:-taskiq}
      - TASKIQ_DLQ_STREAM=${TASKIQ_DLQ_STREAM:-taskiq_dlq}
      - TASKIQ_MAX_ATTEMPTS=${TASKIQ_MAX_ATTEMPTS:-3}
      - TASKIQ_MAX_WORKERS=${TASKIQ_MAX_WORKERS:-4}
      - TASKIQ_STREAM_MAXLEN_MAIN=${TASKIQ_STREAM_MAXLEN_MAIN:-10000}
      - TASKIQ_STREAM_MAXLEN_DLQ=${TASKIQ_STREAM_MAXLEN_DLQ:-10000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio
    volumes:
      - ./minio-data:/data
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web UI
    environment:
      MINIO_ACCESS_KEY: "minio"
      MINIO_SECRET_KEY: "123@123"
    command: server /minio-data/data
  minio-bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minio 123@123;
      /usr/bin/mc mb myminio/file-storage;
      /usr/bin/mc policy download myminio/file-storage;
      exit 0;
      "

volumes:
  postgres_data:
